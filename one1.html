<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>| إنشاء حساب جديد |</title>
    <link rel="stylesheet" href="one1.css">
</head>
<body>
    <div class="space-container">
        <div class="stars"></div>
        
        <div class="login-card signup-card">
            <h2>إنشاء حساب جديد</h2>
            <form>
                <div class="input-group">
                    <input type="text" required>
                    <label>الاسم الكامل</label>
                </div>
                <div class="input-group">
                    <input type="email" required>
                    <label>البريد الإلكتروني</label>
                </div>
                <div class="input-group">
                    <input type="password" required>
                    <label>كلمة المرور</label>
                </div>
                <div class="input-group">
                    <input type="password" required>
                    <label>تأكيد كلمة المرور</label>
                </div>
                <button type="submit" class="login-btn">تأكيد التسجيل</button>
            </form>
            <p class="signup-link">لديك حساب بالفعل؟ <a href="index.html">تسجيل الدخول</a></p>
        </div>
    </div>
    <script>
const signupForm = document.querySelector('form');

    signupForm.addEventListener('submit', (e) => {
    e.preventDefault(); 

    const fullName = document.querySelectorAll('input')[0].value;
    const email = document.querySelectorAll('input')[1].value;
    const password = document.querySelectorAll('input')[2].value;

    if (password.length < 5) {
        alert("كلمة المرور يجب أن تكون أكثر من 5 أحرف");
        return;
    }

    const userData = {
        name: fullName,
        email: email,
        password: password
    };

    localStorage.setItem('user', JSON.stringify(userData));

    alert("تم إنشاء الحساب بنجاح! يمكنك الآن تسجيل الدخول.");
    window.location.href = 'index.html'; 
});</script>
</body>
</html>
